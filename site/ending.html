<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>この原稿は、校了となりました。</title>
    <link rel="icon" href="img/favicon.ico" sizes="any">
    <meta name="description" content="この原稿に、赤入れをしてください">
    <!-- OGP -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="RE:DRAFT">
    <meta property="og:title" content="RE:DRAFT">
    <meta property="og:description" content="この原稿に、赤入れをしてください">
    <meta property="og:url" content="https://redraft-a1j.pages.dev/ending.html">
    <meta property="og:image" content="https://redraft-a1j.pages.dev/img/redraft_kv.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="RE:DRAFT">
    <meta name="twitter:description" content="この原稿に、赤入れをしてください">
    <meta name="twitter:image" content="https://redraft-a1j.pages.dev/img/redraft_kv.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #0a0a0a;
        color: #e8e8e8;
        font-family: 'Noto Serif JP', serif;
      }
      .ending {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 40px 24px;
        box-sizing: border-box;
        text-align: center;
      }
      .ending h1 {
        font-size: 38px;
        font-weight: 700;
        letter-spacing: 0.2em;
        margin: 0;
      }
      .ending p {
        font-size: 15px;
        line-height: 2;
        color: #bbb;
        max-width: 600px;
        margin: 0;
      }

      /* Booth リンクカード */
      .booth-card {
        display: flex;
        align-items: center;
        gap: 9px;
        width: 100%;
        max-width: 240px;
        padding: 8px;
        box-sizing: border-box;
        background: #161616;
        border: 1px solid #333;
        border-radius: 8px;
        text-decoration: none;
        color: inherit;
        transition: background 0.15s, border-color 0.15s;
      }
      .booth-card:hover { background: #1f1f1f; border-color: #555; }
      .booth-card-thumb {
        width: 36px;
        height: 36px;
        flex-shrink: 0;
        border-radius: 6px;
        background: #fc4d50;  /* BOOTH カラー */
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-family: 'Noto Sans JP', sans-serif;
        font-weight: 700;
        font-size: 9px;
        letter-spacing: 0.05em;
      }
      .booth-card-body { text-align: left; min-width: 0; }
      .booth-card-title {
        font-family: 'Noto Sans JP', sans-serif;
        font-size: 12px;
        font-weight: 700;
        color: #f1f1f1;
        margin: 0 0 2px;
      }
      .booth-card-url {
        font-family: 'Noto Sans JP', sans-serif;
        font-size: 10px;
        color: #888;
        margin: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* X でシェア（テキストリンク風） */
      .share-x {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: transparent;
        color: #bbb;
        font-family: 'Noto Sans JP', sans-serif;
        font-size: 17px;
        text-decoration: none;
        transition: color 0.15s;
      }
      .share-x:hover { color: #fff; }
      .share-x svg { width: 22px; height: 22px; }

      /* 上グループ：画面中央 */
      .ending-center {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
      }
      /* 下グループ：画面下部 */
      .ending-bottom {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        padding-bottom: 24px;
      }
      /* 校了の一文は大きく */
      .ending-result {
        font-size: 27px !important;
        color: #e8e8e8 !important;
      }
      .ending-found { margin: 0; }

      /* クレジット（右下に小さく固定） */
      .ending-credit {
        position: fixed;
        left: 24px;
        bottom: 64px;
        text-align: left;
        font-family: 'Noto Sans JP', sans-serif;
        font-size: 13px;
        line-height: 1.7;
        color: #666;
      }
      .ending-credit-title {
        font-weight: 700;
        letter-spacing: 0.1em;
        color: #888;
        margin-bottom: 3px;
      }
      /* クレジット内の X リンク */
      .ending-credit-paren { color: #666; }
      .ending-credit-x {
        color: #888;
        text-decoration: none;
        transition: color 0.15s;
      }
      .ending-credit-x:hover { color: #fff; }
      .ending-credit-x-icon {
        width: 11px;
        height: 11px;
        vertical-align: middle;
        margin-right: 2px;
      }

      /* 赤入れ修正履歴ボタン（シェアの上） */
      .ending-history-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        margin: 0 auto 16px;
        padding: 9px 20px;
        background: transparent;
        border: 1px solid #444;
        border-radius: 6px;
        color: #cdd0d4;
        font-family: 'Noto Sans JP', sans-serif;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
      }
      .ending-history-btn:hover { background: #1f1f1f; border-color: #777; color: #fff; }
      .ending-history-btn svg { width: 16px; height: 16px; }

      /* ===== アーカイブパネル ===== */
      .archive-overlay {
        position: fixed; inset: 0; z-index: 3000;
        background: rgba(15, 17, 20, 0.72);
        display: none; align-items: center; justify-content: center;
        padding: 32px;
      }
      .archive-overlay.open { display: flex; }
      .archive-panel {
        background: #1b1d22; color: #e8e8e8;
        width: 100%; max-width: 880px; max-height: 86vh;
        border-radius: 12px; box-shadow: 0 12px 48px rgba(0,0,0,0.6);
        display: flex; flex-direction: column; overflow: hidden;
        font-family: 'Noto Sans JP', sans-serif; text-align: left;
      }
      .archive-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 18px 24px; border-bottom: 1px solid #2f3336; flex-shrink: 0;
      }
      .archive-title { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: 0.08em; }
      .archive-header-actions { display: flex; align-items: center; gap: 14px; }
      .archive-revisit {
        color: #9aa0a6; text-decoration: none; font-size: 13px;
        border: 1px solid #3a3e44; border-radius: 6px; padding: 6px 12px;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
      }
      .archive-revisit:hover { background: #9b0d12; border-color: #9b0d12; color: #fff; }
      .archive-close {
        background: none; border: none; color: #9aa0a6; font-size: 26px;
        line-height: 1; cursor: pointer; padding: 0 4px; transition: color 0.15s;
      }
      .archive-close:hover { color: #fff; }
      .archive-body { padding: 20px 24px 28px; overflow-y: auto; }
      .archive-chapter { margin-bottom: 28px; }
      .archive-chapter:last-child { margin-bottom: 0; }
      .archive-chapter-label {
        margin: 0 0 14px; font-size: 15px; font-weight: 700; color: #cdd0d4;
        border-left: 3px solid #9b0d12; padding-left: 10px;
      }
      .archive-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
      .archive-cell { display: flex; flex-direction: column; gap: 6px; }
      .archive-thumb {
        position: relative; aspect-ratio: 16 / 10; width: 100%;
        border: 1px solid #2f3336; border-radius: 6px; overflow: hidden;
        background: #0e0f12; padding: 0; cursor: pointer;
        transition: border-color 0.15s, transform 0.1s;
      }
      button.archive-thumb:hover { border-color: #9b0d12; transform: translateY(-1px); }
      .archive-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .archive-thumb-locked {
        display: flex; align-items: center; justify-content: center;
        background: #16171b; border-style: dashed; border-color: #3a3e44; cursor: default;
      }
      .archive-thumb-locked span { color: #6b7077; font-size: 11px; text-align: center; padding: 0 8px; }
      .archive-name { font-size: 11px; color: #b8bcc2; line-height: 1.4; }
      .archive-name.locked { color: #5f6368; }
      .archive-lightbox {
        position: fixed; inset: 0; z-index: 3100; background: rgba(0,0,0,0.88);
        display: none; align-items: center; justify-content: center; padding: 40px;
      }
      .archive-lightbox.open { display: flex; }
      .archive-lightbox-close {
        position: absolute; top: 20px; right: 28px; background: none; border: none;
        color: #fff; font-size: 34px; line-height: 1; cursor: pointer;
      }
      .archive-lightbox-figure {
        margin: 0; max-width: 90vw; max-height: 86vh;
        display: flex; flex-direction: column; align-items: center; gap: 12px;
      }
      .archive-lightbox-figure img {
        max-width: 100%; max-height: 78vh; object-fit: contain;
        border-radius: 4px; box-shadow: 0 8px 40px rgba(0,0,0,0.7);
      }
      .archive-lightbox-figure figcaption { color: #e8e8e8; font-size: 14px; }
      @media (max-width: 768px) { .archive-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
  </head>
  <body>
    <div class="ending">
      <!-- 上グループ：画面中央 -->
      <div class="ending-center">
        <h1>完成稿</h1>
        <p class="ending-result">この原稿は、校了となりました。</p>
        <!-- 赤入れ修正履歴（アーカイブパネルを開く） -->
        <button class="ending-history-btn" id="open-archive" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 3v5h5" />
            <path d="M3.05 13A9 9 0 1 0 6 5.3L3 8" />
            <path d="M12 7v5l3 2" />
          </svg>
          赤入れ修正履歴
        </button>
        <!-- X でシェア（note URL は仮。あとで差し替え） -->
        <a
          class="share-x"
          id="share-x"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
        >
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
          </svg>
          シェアする
        </a>
      </div>

      <!-- 下グループ：画面下部 -->
      <div class="ending-bottom">
        <p class="ending-found">とある出版物が見つかったようです。</p>
        <!-- Booth リンクカード -->
        <a class="booth-card" href="https://kaf386.booth.pm/items/8476969" target="_blank" rel="noopener noreferrer">
          <div class="booth-card-thumb">BOOTH</div>
          <div class="booth-card-body">
            <p class="booth-card-title">RE-DRAFT</p>
            <p class="booth-card-url">kaf386.booth.pm/items/8476969</p>
          </div>
        </a>
      </div>
    </div>

    <!-- クレジット（右下に小さく） -->
    <div class="ending-credit">
      <div class="ending-credit-title">CREDIT</div>
      <div>Planning：KAF<span class="ending-credit-paren"> ( <a class="ending-credit-x" href="https://x.com/KAF_KA386" target="_blank" rel="noopener noreferrer"><svg class="ending-credit-x-icon" viewBox="0 0 24 24" fill="currentColor" aria-label="X"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>アカウント</a> )</span></div>
      <div>KV Design：PAI</div>
    </div>

    <!-- 赤入れ修正履歴パネル（index のアーカイブと同等。閉じる左に「一度原稿を見る」） -->
    <div class="archive-overlay" id="archive-overlay">
      <div class="archive-panel" role="dialog" aria-modal="true">
        <div class="archive-header">
          <h2 class="archive-title">赤入れ修正履歴</h2>
          <div class="archive-header-actions">
            <a class="archive-revisit" href="index.html">もう一度原稿を見る</a>
            <button class="archive-close" id="archive-close" aria-label="閉じる" title="閉じる">×</button>
          </div>
        </div>
        <div class="archive-body" id="archive-body"></div>
      </div>
    </div>

    <!-- 拡大表示（ライトボックス） -->
    <div class="archive-lightbox" id="archive-lightbox">
      <button class="archive-lightbox-close" id="lightbox-close" aria-label="閉じる">×</button>
      <figure class="archive-lightbox-figure">
        <img id="lightbox-img" src="" alt="" />
        <figcaption id="lightbox-caption"></figcaption>
      </figure>
    </div>

    <script>
      // X 投稿文（note 記事へのリンク）
      var noteUrl = 'https://note.com/kaf_386/n/nd406a5e77899';
      var text = 'RE:DRAFT\n──────────\nこの原稿を校了しました。\n#REDRAFT';
      var href = 'https://twitter.com/intent/tweet?text=' +
        encodeURIComponent(text) + '&url=' + encodeURIComponent(noteUrl);
      document.getElementById('share-x').setAttribute('href', href);

      // ───────────── 赤入れ修正履歴パネル ─────────────
      // index 側の archive.ts / archiveStore.ts と同じデータ・キーを使う
      var ARCHIVE_CHAPTERS = [
        { label: '1.夕方の部屋', entries: [
          { id: 'A1-03', name: '赤入れ修正１' }, { id: 'A1-07', name: '赤入れ修正２' },
          { id: 'A1-06', name: '赤入れ修正３' }, { id: 'A1-01', name: '赤入れ修正４' },
          { id: 'A1-02', name: '赤入れ修正５' }, { id: 'A1-08', name: '赤入れ修正６' },
          { id: 'A1-04', name: '赤入れ修正７' }, { id: 'A1-05', name: '赤入れ修正８' },
        ]},
        { label: '2.知らない駅', entries: [
          { id: 'A2-11', name: '赤入れ修正９' }, { id: 'A2-01', name: '赤入れ修正１０' },
          { id: 'A2-12', name: '赤入れ修正１１' }, { id: 'A2-08', name: '赤入れ修正１２' },
          { id: 'A2-03', name: '赤入れ修正１３' }, { id: 'A2-05', name: '赤入れ修正１４' },
        ]},
        { label: '3.迷い', entries: [
          { id: 'A3-01', name: '赤入れ修正１５' }, { id: 'A3-02', name: '赤入れ修正１６' },
          { id: 'A3-11', name: '赤入れ修正１７' }, { id: 'A3-15', name: '赤入れ修正１８' },
          { id: 'A3-21', name: '赤入れ修正１９' }, { id: 'A3-04', name: '赤入れ修正２０' },
          { id: 'A3-12', name: '赤入れ修正２１' },
        ]},
        { label: '4.乗車', entries: [
          { id: 'A4-02', name: '赤入れ修正２２' }, { id: 'A4-08', name: '赤入れ修正２３' },
          { id: 'A4-33', name: '赤入れ修正２４' }, { id: 'A4-04', name: '赤入れ修正２５' },
          { id: 'A4-05', name: '赤入れ修正２６' },
        ]},
        { label: '5.帰る場所', entries: [
          { id: 'A5-03', name: '赤入れ修正２７' }, { id: 'A5-01', name: '赤入れ修正２８' },
          { id: 'A5-02', name: '赤入れ修正２９' },
        ]},
      ];

      function loadArchive() {
        try {
          var raw = localStorage.getItem('redraft_archive_v1');
          if (!raw) return { seen: [], reached: [] };
          var p = JSON.parse(raw);
          return {
            seen: Array.isArray(p.seenAnomalyIds) ? p.seenAnomalyIds : [],
            reached: Array.isArray(p.reachedStageIds) ? p.reachedStageIds : [],
          };
        } catch (e) { return { seen: [], reached: [] }; }
      }

      function buildArchive() {
        var prog = loadArchive();
        var seen = {};
        prog.seen.forEach(function (id) { seen[id] = true; });
        var body = document.getElementById('archive-body');
        body.innerHTML = '';
        // ending では全章を表示する（校了到達者向け）
        ARCHIVE_CHAPTERS.forEach(function (ch) {
          var sec = document.createElement('section');
          sec.className = 'archive-chapter';
          var h = document.createElement('h3');
          h.className = 'archive-chapter-label';
          h.textContent = ch.label;
          sec.appendChild(h);
          var grid = document.createElement('div');
          grid.className = 'archive-grid';
          ch.entries.forEach(function (en) {
            var cell = document.createElement('div');
            cell.className = 'archive-cell';
            var img = 'img/archive/' + en.id + '.png';
            if (seen[en.id]) {
              var btn = document.createElement('button');
              btn.className = 'archive-thumb';
              btn.title = en.name;
              btn.onclick = function () { openLightbox(img, en.name); };
              var im = document.createElement('img');
              im.src = img; im.alt = en.name; im.loading = 'lazy';
              btn.appendChild(im);
              cell.appendChild(btn);
              var nm = document.createElement('span');
              nm.className = 'archive-name';
              nm.textContent = en.name;
              cell.appendChild(nm);
            } else {
              var lock = document.createElement('div');
              lock.className = 'archive-thumb archive-thumb-locked';
              var sp = document.createElement('span');
              sp.textContent = 'まだ確認していません';
              lock.appendChild(sp);
              cell.appendChild(lock);
              var nm2 = document.createElement('span');
              nm2.className = 'archive-name locked';
              nm2.textContent = '???';
              cell.appendChild(nm2);
            }
            grid.appendChild(cell);
          });
          sec.appendChild(grid);
          body.appendChild(sec);
        });
      }

      var overlay = document.getElementById('archive-overlay');
      var lightbox = document.getElementById('archive-lightbox');
      function openArchive() { buildArchive(); overlay.classList.add('open'); }
      function closeArchive() { overlay.classList.remove('open'); }
      function openLightbox(src, cap) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox-img').alt = cap;
        document.getElementById('lightbox-caption').textContent = cap;
        lightbox.classList.add('open');
      }
      function closeLightbox() { lightbox.classList.remove('open'); }

      document.getElementById('open-archive').onclick = openArchive;
      document.getElementById('archive-close').onclick = closeArchive;
      overlay.onclick = function (e) { if (e.target === overlay) closeArchive(); };
      document.getElementById('lightbox-close').onclick = function (e) { e.stopPropagation(); closeLightbox(); };
      lightbox.onclick = function (e) { e.stopPropagation(); closeLightbox(); };
      document.querySelector('#archive-lightbox .archive-lightbox-figure').onclick = function (e) { e.stopPropagation(); };
    </script>
  </body>
</html>
